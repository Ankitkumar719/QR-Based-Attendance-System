<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Active Session — Smart Attendance</title>
  <link rel="stylesheet" data-versionable data-href="assets/css/styles.css" />
  <script>
    const APP_VERSION = String(Date.now());
    window.APP_VERSION = APP_VERSION;
    const styleLink = document.querySelector('link[data-versionable][data-href]');
    if (styleLink) {
      const href = new URL(styleLink.dataset.href, window.location.href);
      href.searchParams.set('v', APP_VERSION);
      styleLink.href = href;
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
</head>
<body class="session-app">
  <div class="mobile-topbar session-navbar">
    <button id="backBtn" class="mobile-menu-btn" aria-label="Back">←</button>
    <div class="mobile-brand">Active Session</div>
    <button id="endSessionBtn" class="mobile-profile-btn" aria-label="End Session">⏹</button>
  </div>
  <header class="desktop-topbar session-topbar">
    <div class="topbar-brand">Active Session</div>
    <div class="topbar-actions">
      <button id="backBtnDesktop" class="topbar-btn">← Back</button>
      <button id="endSessionBtnDesktop" class="btn btn-danger">End Session</button>
    </div>
  </header>

  <main class="dashboard-content session-content">
    <div class="session-grid">
      <section class="panel-card session-overview">
        <div class="flex-between">
          <div>
            <div class="session-status">LIVE</div>
            <h2 class="section-title">Attendance QR & Status</h2>
          </div>
          <div class="text-muted text-small">Keep this tab visible during your session.</div>
        </div>

        <div class="grid-2 gap-lg">
          <div class="panel-card card-secondary">
            <canvas id="qrCanvas" width="280" height="280"></canvas>
          </div>
          <div class="panel-card card-secondary section-gap">
            <div>
              <p class="text-muted text-small uppercase">Session Token</p>
              <div class="stat-value" id="tokenDisplay">—</div>
            </div>
            <button class="btn btn-info full-width" id="copyTokenBtn">Copy Token</button>
            <div class="live-stats grid gap-sm">
              <div class="session-stat">
                <div class="stat-value" id="presentCount">0</div>
                <div class="stat-label">Present</div>
              </div>
              <div class="session-stat">
                <div class="stat-value" id="absentCount">0</div>
                <div class="stat-label">Absent</div>
              </div>
              <div class="session-stat">
                <div class="stat-value" id="totalCount">0</div>
                <div class="stat-label">Total</div>
              </div>
            </div>
          </div>
        </div>

        <div class="panel-card card-secondary section-gap">
          <div class="grid gap-sm">
            <div class="form-group">
              <label>Session ID</label>
              <div id="sessionId" class="text-muted">-</div>
            </div>
            <div class="form-group">
              <label>Expires At</label>
              <div id="expiresAt" class="text-muted">-</div>
            </div>
          </div>
          <p id="expiresWarning" class="text-warning"></p>
        </div>
      </section>

      <section class="panel-card session-feed">
        <div class="flex-between">
          <h2 class="section-title">Live Attendance Feed</h2>
          <span class="text-muted text-small">Updates in real time</span>
        </div>
        <div class="live-feed-list" id="recentFeedList">
          <div class="feed-empty">Waiting for students to mark attendance...</div>
        </div>
      </section>
    </div>

    <section class="panel-card students-panel">
      <div class="flex-between">
        <h2 class="section-title">Student Attendance</h2>
        <div class="filter-tabs" id="filterTabs"></div>
      </div>
      <div class="table-responsive">
        <div class="students-grid" id="studentsList">
          <div class="empty-state">Loading students...</div>
        </div>
      </div>
    </section>
  </main>

  <script type="module">
    const APP_VERSION = window.APP_VERSION || String(Date.now());
    const { apiGet, apiPost, ensureAuth } = await import(`./assets/js/api.js?v=${APP_VERSION}`);

    ensureAuth(["faculty"]);

    const params = new URLSearchParams(window.location.search);
    const sessionId = params.get('sessionId') || localStorage.getItem('currentSessionId');
    const qrToken = params.get('qrToken') || localStorage.getItem('currentQrToken');
    const className = params.get('className') || localStorage.getItem('currentClassName') || 'Active Session';
    const expiresAt = params.get('expiresAt') || localStorage.getItem('currentExpiresAt');

    const backBtn = document.getElementById('backBtn');
    const endSessionBtn = document.getElementById('endSessionBtn');
    const backBtnDesktop = document.getElementById('backBtnDesktop');
    const endSessionBtnDesktop = document.getElementById('endSessionBtnDesktop');

    const navigateBack = () => window.location.href = 'faculty.html';
    backBtn?.addEventListener('click', navigateBack);
    backBtnDesktop?.addEventListener('click', navigateBack);
    endSessionBtn?.addEventListener('click', navigateBack);
    endSessionBtnDesktop?.addEventListener('click', navigateBack);

    if (!sessionId || !qrToken) {
      alert('No active session found');
      window.location.href = 'faculty.html';
    }

    document.querySelector('.mobile-brand').textContent = className;
    document.querySelector('.topbar-brand').textContent = className;
    document.getElementById('sessionId').textContent = sessionId;
    document.getElementById('expiresAt').textContent = expiresAt ? new Date(expiresAt).toLocaleTimeString() : '-';

    new QRious({
      element: document.getElementById('qrCanvas'),
      value: qrToken,
      size: 280,
      level: 'H'
    });

    document.getElementById('tokenDisplay').textContent = qrToken;

    document.getElementById('copyTokenBtn').addEventListener('click', () => {
      navigator.clipboard.writeText(qrToken).then(() => {
        const btn = document.getElementById('copyTokenBtn');
        btn.textContent = '✅ Copied!';
        setTimeout(() => { btn.textContent = 'Copy Token'; }, 2000);
      }).catch(() => {
        alert('Failed to copy token.');
      });
    });

    function updateExpiryWarning() {
      if (!expiresAt) return;
      const now = new Date();
      const expiry = new Date(expiresAt);
      const diff = expiry - now;
      const warning = document.getElementById('expiresWarning');
      if (diff <= 0) {
        warning.textContent = '⚠️ Session has expired';
      } else if (diff < 5 * 60 * 1000) {
        warning.textContent = `⚠️ Expires in ${Math.ceil(diff / 60000)} min`;
      }
    }

    updateExpiryWarning();
    setInterval(updateExpiryWarning, 30000);

    let allStudents = [];
    let currentFilter = 'all';

    async function loadStudents() {
      try {
        const data = await apiGet(`/api/faculty/session/${sessionId}/students`);
        allStudents = data.students || [];
        document.getElementById('presentCount').textContent = data.presentCount || 0;
        document.getElementById('absentCount').textContent = data.absentCount || 0;
        document.getElementById('totalCount').textContent = data.totalStudents || allStudents.length;
        renderStudentList();
      } catch (err) {
        document.getElementById('studentsList').innerHTML = '<div class="panel-message">Error loading students</div>';
        console.error(err);
      }
    }

    function renderStudentList() {
      const container = document.getElementById('studentsList');
      const filterTabs = document.getElementById('filterTabs');
      const presentCount = allStudents.filter(s => s.status === 'present').length;
      const absentCount = allStudents.filter(s => s.status === 'absent').length;
      filterTabs.innerHTML = `
        <button class="filter-tab ${currentFilter === 'all' ? 'active' : ''}" data-filter="all">All (${allStudents.length})</button>
        <button class="filter-tab ${currentFilter === 'present' ? 'active' : ''}" data-filter="present">Present (${presentCount})</button>
        <button class="filter-tab ${currentFilter === 'absent' ? 'active' : ''}" data-filter="absent">Absent (${absentCount})</button>
      `;
      filterTabs.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', () => {
          currentFilter = btn.dataset.filter;
          renderStudentList();
        });
      });
      const filtered = allStudents.filter(student => {
        if (currentFilter === 'present') return student.status === 'present';
        if (currentFilter === 'absent') return student.status === 'absent';
        return true;
      });
      if (!filtered.length) {
        container.innerHTML = '<div class="empty-state">No students in this category</div>';
        return;
      }
      container.innerHTML = filtered.map(student => `
        <div class="student-card">
          <div class="student-info">
            <div class="roll-no">${student.rollNo || 'N/A'}</div>
            <div class="name">${student.name || 'Unknown student'}</div>
          </div>
          <span class="status-badge ${student.status}">${student.status || 'unknown'}</span>
          <div class="toggle-btns">
            <button class="toggle-btn ${student.status === 'present' ? 'active' : ''}" data-student-id="${student.id}" data-status="present">P</button>
            <button class="toggle-btn ${student.status === 'absent' ? 'active' : ''}" data-student-id="${student.id}" data-status="absent">A</button>
          </div>
        </div>
      `).join('');
      container.querySelectorAll('.toggle-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const studentId = btn.dataset.studentId;
          const newStatus = btn.dataset.status;
          btn.disabled = true;
          try {
            await apiPost('/api/faculty/manual-attendance', { sessionId, studentId, status: newStatus });
            const student = allStudents.find(s => s.id === studentId);
            if (student) student.status = newStatus;
            renderStudentList();
          } catch (err) {
            alert('Unable to update attendance');
            console.error(err);
          } finally {
            btn.disabled = false;
          }
        });
      });
    }

    loadStudents();
  </script>
</body>
</html>
