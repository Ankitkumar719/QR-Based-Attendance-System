services:
  # Single-service deployment (Node.js backend + local Python worker)
  # Uses Docker so we can install the Python face-recognition dependencies inside the same service.
  - type: web
    name: smart-attendance-backend
    env: docker
    rootDir: .
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # Python binary inside the container
      - key: FACE_PYTHON_BIN
        value: python3
